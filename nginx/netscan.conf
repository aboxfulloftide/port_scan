# /etc/nginx/sites-available/netscan
#
# Deploy:
#   sudo cp /home/matheau/code/port_scan/nginx/netscan.conf /etc/nginx/sites-available/netscan
#   sudo ln -s /etc/nginx/sites-available/netscan /etc/nginx/sites-enabled/netscan
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

upstream netscan_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 0.0.0.0:80;
    server_name _;          # Replace with hostname or IP if desired

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Static frontend (React SPA) ───────────────────────────────────────────
    root /home/matheau/code/port_scan/static;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://netscan_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────────
    location /api/scans/ws/ {
        proxy_pass         http://netscan_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # keep WS alive during long scans
    }

    # ── Screenshot files (served directly by Nginx) ───────────────────────────
    # Remove this block to use the auth-gated FastAPI route instead:
    #   GET /api/hosts/screenshots/{filename}
    location /screenshots/ {
        alias /home/matheau/code/port_scan/screenshots/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
